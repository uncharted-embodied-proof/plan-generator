<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Wizard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>

    <style>
        /* Custom styles for chat messages, adapted for dark theme */
        .message { margin-bottom: 5px; }

        .user-message {
          font-size: 0.95rem;
          text-align: right;
          color: #FFAA28;
          background: #334; /* Darker background for user messages */
          padding: 0.05rem 0.5rem;
          border-radius: 0.25rem ;
          margin-left: 1.5rem;
        }
        .bot-message {
          font-size: 0.95rem;
          text-align: left;
          color: #A5D6A7; /* Light green for dark theme */
          background: #223; /* Even darker background for bot messages */
          padding: 0.05rem 0.5rem;
          border-radius: 0.25rem ;
          margin-right: 1.5rem;
        }

        table {
          font-size: 80%;
          font-weight: 300;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="container-fluid flex-grow-1 d-flex flex-column py-3">
        <div class="row flex-grow-1">
            <!-- Left Column: Summary and Metadata -->
            <div class="col-md-3 d-flex flex-column">
                <!--
                <div class="p-2 mb-1 bg-dark-subtle text-emphasis-dark rounded" style="font-size: 90%">
                </div>
                -->
                <!--
                <div id="map" class="flex-grow-1 mb-1">
                -->
                <div id="map" class="flex-grow-0 mb-1">
                  <p style="position: absolute; top: 20; z-index: 1; max-width: 17rem; font-size: 90%"> 
                    Starting at X, deliver to Y and come back to X.
                  </p>
                </div>
                <div id="legs">
                </div>
                <div id="counter" class="p-2 bg-dark-subtle text-emphasis-dark rounded"></div>
            </div>

            <!-- Center Column: Chat Interface -->
            <div class="col-md-6 d-flex flex-column">
                <div id="chat-container" class="flex-grow-1 d-flex flex-column border rounded p-2 mb-3" style="heigh: 500px">
                    <div id="chat-history" class="flex-grow-1 overflow-auto border-bottom pb-2 mb-2"></div>
                    <div id="input-area" class="d-flex">
                        <input type="text" id="message-input" class="form-control me-2" placeholder="Type your message...">
                        <button id="send-button" class="btn btn-primary">Send</button>
                    </div>
                    <p id="intro" class="text-muted mt-2" style="font-size: 90%">Start the conversation by asking the AI if there are valid COAs. You can query AI about constraints and query COAs. You can also ask the AI to describe/explain the governing model.</p>
                </div>
            </div>

            <!-- Right Column: Drilldown -->
            <div class="col-md-3 d-flex flex-column">
                <div class="d-flex align-items-center mb-3">
                    <button onClick="prev()" class="btn btn-secondary btn-sm me-1">Prev</button>
                    <input type="number" id="plan-id" class="form-control form-control-sm text-center mx-1" style="width: 80px;">
                    <button onClick="next()" class="btn btn-secondary btn-sm me-1">Next</button>
                    <button onClick="view()" class="btn btn-primary btn-sm">View</button>
                </div>
                <div id="plan-viewer" class="flex-grow-1 bg-dark-subtle text-emphasis-dark rounded p-2">
                </div>
            </div>
        </div>
    </div>
    <script>
        async function streamJSONL(url) {
          const res = await fetch(url);

          if (!res.ok) {
            throw new Error(`Failed: ${res.status}`);
          }

          const reader = res.body
            .pipeThrough(new TextDecoderStream())
            .getReader();

          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += value;

            const lines = buffer.split("\n");
            buffer = lines.pop(); // keep incomplete line

            for (const line of lines) {
              if (!line.trim()) continue;

              const obj = JSON.parse(line);
              handle(obj);
            }
            await new Promise(r => setTimeout(r, 0));
          }

          // last line
          if (buffer.trim()) {
            handle(JSON.parse(buffer));
          }
        }

        function handle(obj) {
          console.log(obj);
        }


        const chatHistory = document.getElementById('chat-history');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');

        let planId = '';
        let world = {};
        let conversationHistory = [];


        /**
         * D3 Gen force-directed graph
        **/
        function generateGraph(world, topIds = [], bottomIds = []) {
          const width = 200;
          const height = 350;


          const nodes = world.nodes.map(d => ({ ...d }));
          const links = world.edges.map(d => ({ ...d }));


          const svg = d3.select("#map")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

          const link = svg.append("g")
            .selectAll("line")
            .data(links)
            .enter()
            .append("line")
            .attr('stroke-width', 2)
            .attr("stroke", "#bbb");

          const nodeGroup = svg.append("g")
            .selectAll("g")
            .data(nodes)
            .enter()
            .append("g")
            .call(d3.drag()
              .on("start", dragstarted)
              .on("drag", dragged)
              .on("end", dragended));

          nodeGroup.append("circle")
            .attr("r", 17)
            .attr("fill", "#ccc")
            .attr("stroke", (d) => {
              return "#222";
            })
            .attr("stroke-width", 4);

          nodeGroup.append("text")
            .text(d => d.location)
            .attr("x", -5)
            .attr("y", 4)
            .style("font-size", "14px")
            .style("font-weight", 900)
            .style("font-family", "sans-serif");

          const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links)
              .id(d => d.id)
              .distance(120))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("x", d3.forceX(width / 2).strength(0.05))
            .force("y", d3.forceY(height / 2).strength(0.05))
            .on("tick", ticked);

          nodes.forEach(n => {
            if (topIds.includes(n.location)) {
              n.fx = width / 2;
              n.fy = height - 50;
            }
            if (bottomIds.includes(n.id)) {
              n.fx = width / 2;
              n.fy = 50;
            }
          });

          function ticked() {
            link
              .attr("x1", d => d.source.x)
              .attr("y1", d => d.source.y)
              .attr("x2", d => d.target.x)
              .attr("y2", d => d.target.y);

            nodeGroup.attr("transform", d => `translate(${d.x}, ${d.y})`);
          }

          function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          }

          function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
          }

          function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            if (!topIds.includes(d.id) && !bottomIds.includes(d.id)) {
              d.fx = null;
              d.fy = null;
            }
          }
        }
        function prev() {
          const prevId = planId - 1;
          fetch(`/plans/${prevId}`)
            .then(d => d.json())
            .then(d => {
              viewPlan(d.plan);
            });

        }
        function next() {
          const nextId = planId + 1;
          fetch(`/plans/${nextId}`)
            .then(d => d.json())
            .then(d => {
              viewPlan(d.plan);
            });
        }
        function view() {
          const str = document.getElementById('plan-id').value;
          fetch(`/plans/${str}`)
            .then(d => d.json())
            .then(d => {
              viewPlan(d.plan);
            });
        }


        // Plan/config view
        function viewPlan(plan) {
          if (!plan) return;

          const elem = d3.select('#plan-viewer');
          elem.selectAll('*').remove();


          document.getElementById('plan-id').value = plan.id;
          planId = plan.id;


          elem.append('h5').text('Summary');
          const ul = elem.append('ul');
          ul.append('li').text(`Patient survival: ${plan.summary.patientSurvival.toFixed(2)}`);
          ul.append('li').text(`Asset safety: ${plan.summary.assetSafety.toFixed(2)}`);
          ul.append('li').text(`Energy reserve: ${plan.summary.energyReserve}`);
          ul.append('li').text(`Delivery time margin: ${plan.summary.deliveryTimeMargin}`);
          ul.append('li').text(`Temp. deviation: ${plan.summary.payloadTemperatureDeviation}`);


          elem.append('h5').text('Leg configurations');
          const table = elem.append('table').attr('class', 'table table-dark table-striped');
          const wmap = new Map(world.nodes.map(n => [n.id, n]));

          const thead = table.append('thead');
          thead.append('th').text('leg');
          thead.append('th').text('comm');
          thead.append('th').text('turbo');
          thead.append('th').text('avoid.');
          thead.append('th').text('energy');
          thead.append('th').text('p temp.');

          const tbody = table.append('tbody');
          let cnt = 0;
          for (const segment of plan.trip) {
            const tr = tbody.append('tr');
            tr.append('td').text(segment.leg.leg);
            tr.append('td').text(segment.leg.comm);
            tr.append('td').text(segment.leg.turbo);
            tr.append('td').text(segment.leg.avoidance);
            tr.append('td').text(segment.stats.energyReserve);
            tr.append('td').text(
              segment.stats.payloadTemperature ? segment.stats.payloadTemperature.toFixed(2) : '--'
            );
            cnt ++;
          }
        }

        // Leg attribute table
        function makeLegsTable(legs) {
          const elem = d3.select('#legs');
          elem.selectAll('*').remove();

          const table = elem.append('table').attr('class', 'table table-dark table-striped');
          const thead = table.append('thead');
          thead.append('th').text('Leg');
          thead.append('th').text('Dist');
          thead.append('th').text('Weat.');
          thead.append('th').text('Temp.');
          thead.append('th').text('Diff.');

          const tbody = table.append('tbody');
          for (const leg of legs) {
            const tr = tbody.append('tr');
            tr.append('td').text(leg.leg);
            tr.append('td').text(leg.distance);
            tr.append('td').text(leg.weather);
            tr.append('td').text(leg.temperature);
            tr.append('td').text(leg.difficulty);
          }

        }

        fetch('./world.json', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        }).then(d => {
          return d.json()
        }).then(d => {
          generateGraph(d, ['X'], ['Y']);
          world = d;
        });;

        fetch('./legs.json', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        }).then(d => {
          return d.json();
        }).then(d => {
          // lazy dedupe
          const legs = [];
          for (const l of d) {
            if (legs.find(d => d.leg === l.leg)) {
              continue;
            }
            legs.push(l);
          }

          makeLegsTable(legs);
        });

        fetch('/plans/1')
          .then(d => d.json())
          .then(d => {
            setTimeout(() => {
              viewPlan(d.plan);
            }, 800);
          });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user-message');
            messageInput.value = '';

            try {
                d3.select('#intro').remove();

                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message, history: conversationHistory })
                });

                if (!response.ok) {
                    throw new Error('Failed to get response from server');
                }

                const data = await response.json();
                const reply = data.reply;

                appendMessage(reply, 'bot-message');

                // Update conversation history
                conversationHistory.push({ role: 'user', parts: [{ text: message }] });
                conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

            } catch (error) {
                console.error('Error:', error);
                appendMessage('Error: Could not connect to the server.', 'bot-message');
            }
        }

        function appendMessage(text, className) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', className);


            messageElement.innerHTML = marked.parse(text);
            chatHistory.appendChild(messageElement);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });


        // Stopwatch

        document.getElementById('counter').innerHTML = formatTime(c);
        setInterval(() => {
          c++;
          document.getElementById('counter').innerHTML = formatTime(c);
        }, 1000);
        */

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
