<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Wizard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: flex-start; }

        table {
          margin-top: 1rem;
          width: 100%;
          border-collapse: collapse;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                       Roboto, "Helvetica Neue", Arial, sans-serif;
          font-size: 0.75rem;
          color: #2a2a2a;
        }

        /* Header */
        thead {
          background-color: #f4f6f8;
        }

        th {
          text-align: left;
          font-weight: 600;
          padding: 0.75rem 1rem;
          border-bottom: 2px solid #e1e4e8;
          letter-spacing: 0.02em;
        }

        /* Body cells */
        td {
          padding: 0.7rem 1rem;
          border-bottom: 1px solid #eceff1;
        }

        /* Alternating rows */
        tbody tr:nth-child(even) {
          background-color: #fafbfc;
        }

        #chat-container { 
          width: 65%; 
          max-width: 800px; 
          border: 1px solid #ddd; 
          padding: 5px; 
          border-radius: 5px; 
        }
        #chat-history { 
          height: 550px; 
          overflow-y: scroll; 
          border-bottom: 1px solid #ddd; 
          margin-bottom: 10px; 
          padding: 5px; 
        }
        .message { margin-bottom: 5px; }

        .user-message { 
          text-align: right; 
          color: blue; 
          background: #eef; 
          padding: 0.05rem 0.5rem; 
          border-radius: 0.25rem ;
          margin-left: 1.5rem;
        }
        .bot-message { 
          text-align: left; 
          color: #234; 
          background: #f4f4f4; 
          padding: 0.05rem 0.5rem; 
          border-radius: 0.25rem ;
          margin-right: 1.5rem;
        }
        #input-area { display: flex; width: 100%; }
        #message-input { flex-grow: 1; padding: 5px; }
        #send-button { padding: 5px 10px; }
        #plan-viewer {
          display: flex;
          flex-direction: column;
        }
    </style>
</head>
<body style="display: flex; flex-direction: row"">
    <!--
    <image src="./simple-world.png" height="400px" />
      -->
    <div style="display: flex; flex-direction: column">
      <div style="max-width: 180px; padding: 10px">
        Starting at X, deliver the supply to Y and come back to X.
      </div>
      <div id="map"></div>
      <div id="counter"></div>
    </div>
    <div id="chat-container">
        <div id="chat-history"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Type your message...">
            <button id="send-button">Send</button>
        </div>
    </div>
    <div style="padding: 1rem"> 
      <div style="display: flex">
        <button onClick="prev()">Prev</button>
        &nbsp;
        <input type="number" id="plan-id">
        &nbsp;
        <button onClick="next()">Next</button>
        &nbsp;
        &nbsp;
        <button onClick="view()">View</button>
      </div>
      <div id="plan-viewer">
      </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');

        let planId = '';
        let plans = [];
        let world = {};
        let conversationHistory = [];


        /**
         * D3 Gen force-directed graph
        **/
        function generateGraph(world, topIds = [], bottomIds = []) {
          const width = 180;
          const height = 350;

          const nodes = world.nodes.map(d => ({ ...d }));
          const links = world.edges.map(d => ({ ...d }));

          const svg = d3.select("#map")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

          const link = svg.append("g")
            .selectAll("line")
            .data(links)
            .enter()
            .append("line")
            .attr("stroke", "#aaa");

          const nodeGroup = svg.append("g")
            .selectAll("g")
            .data(nodes)
            .enter()
            .append("g")
            .call(d3.drag()
              .on("start", dragstarted)
              .on("drag", dragged)
              .on("end", dragended));

          nodeGroup.append("circle")
            .attr("r", 17)
            .attr("fill", "#ccc")
            .attr("stroke", "#fff")
            .attr("stroke-width", 3);

          nodeGroup.append("text")
            .text(d => d.id)
            .attr("x", -5)
            .attr("y", 4)
            .style("font-size", "14px")
            .style("font-family", "sans-serif");

          const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links)
              .id(d => d.id)
              .distance(120))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("x", d3.forceX(width / 2).strength(0.05))
            .force("y", d3.forceY(height / 2).strength(0.05))
            .on("tick", ticked);

          nodes.forEach(n => {
            if (topIds.includes(n.id)) {
              n.fx = width / 2;
              n.fy = 50;
            }
            if (bottomIds.includes(n.id)) {
              n.fx = width / 2;
              n.fy = height - 50;
            }
          });

          function ticked() {
            link
              .attr("x1", d => d.source.x)
              .attr("y1", d => d.source.y)
              .attr("x2", d => d.target.x)
              .attr("y2", d => d.target.y);

            nodeGroup.attr("transform", d => `translate(${d.x}, ${d.y})`);
          }

          function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          }

          function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
          }

          function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            if (!topIds.includes(d.id) && !bottomIds.includes(d.id)) {
              d.fx = null;
              d.fy = null;
            }
          }
        }

        function prev() {
          let idx = plans.findIndex(p => p.id === planId);
          if (idx < 0) return;
          idx --;
          if (idx < 0) return;

          const plan = plans[idx];
          if (!plan) return;
          planId = plan.id;
          viewPlan(planId);
          document.getElementById('plan-id').value = planId;
        }
        function next() {
          let idx = plans.findIndex(p => p.id === planId);
          if (idx < 0) return;
          idx ++;
          if (idx > plans.length - 1) return;

          const plan = plans[idx];
          if (!plan) return;
          planId = plan.id;
          viewPlan(planId);
          document.getElementById('plan-id').value = planId;
        }
        function view() {
          const str = document.getElementById('plan-id').value;
          planId = parseInt(str);
          viewPlan(planId);
        }


        function viewPlan(planId) {
          const plan = plans.find(p => p.id === planId);
          if (!plan) return;

          const elem = d3.select('#plan-viewer');
          elem.selectAll('*').remove();

          // elem.append('p').text(`Plan ${plan.id}`);
          elem.append('p').text(`Energy expensiture: ${plan.summary.energy}`);
          elem.append('p').text(`Time spent: ${plan.summary.time}`);
          elem.append('p').text(`Plan difficulty: ${plan.summary.difficulty}`);


          const table = elem.append('table');
          const wmap = new Map(world.nodes.map(n => [n.id, n]));

          const thead = table.append('thead');
          thead.append('th').text('loc.');
          thead.append('th').text('comm');
          thead.append('th').text('turbo');
          thead.append('th').text('avoid.');
          thead.append('th').text('battery');
          thead.append('th').text('p temp.');

          const tbody = table.append('tbody');
          let cnt = 0;
          for (const pid of plan.plan) {
            const ws = wmap.get(pid);
            const tr = tbody.append('tr');
            tr.append('td').text(ws.location);
            tr.append('td').text(ws.comm);
            tr.append('td').text(ws.turbo);
            tr.append('td').text(ws.avoidance);
            tr.append('td').text(plan.stats[cnt].battery);
            tr.append('td').text(
              plan.stats[cnt].payloadTemp ? plan.stats[cnt].payloadTemp.toFixed(2) : null
            );
            cnt ++;
          }
        }

        fetch('./locations.json', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        }).then(d => {
          return d.json()
        }).then(d => {
          generateGraph(d, ['X'], ['Y']);
        });;

        fetch('./world.json', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        }).then(d => { return d.json()
        }).then(d => { world = d; });

        fetch('./plans.json', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        }).then(d => { return d.json()
        }).then(d => { 
          plans = d; 

          setTimeout(() => {
            planId = plans[0].id;
            document.getElementById('plan-id').value = planId;
            viewPlan(planId);
          }, 500);
        });


        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user-message');
            messageInput.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message, history: conversationHistory })
                });

                if (!response.ok) {
                    throw new Error('Failed to get response from server');
                }

                const data = await response.json();
                const reply = data.reply;

                appendMessage(reply, 'bot-message');

                // Update conversation history
                conversationHistory.push({ role: 'user', parts: [{ text: message }] });
                conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

            } catch (error) {
                console.error('Error:', error);
                appendMessage('Error: Could not connect to the server.', 'bot-message');
            }
        }

        function appendMessage(text, className) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', className);


            messageElement.innerHTML = marked.parse(text);
            chatHistory.appendChild(messageElement);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });


        // Stopwatch
        let c = 0;
        function formatTime(seconds) {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          return `Elapsed:  ${mins}m ${secs}s`;
        }
        document.getElementById('counter').innerHTML = formatTime(c);
        setInterval(() => {
          c++;
          document.getElementById('counter').innerHTML = formatTime(c);
        }, 1000);

    </script>
</body>
</html>
